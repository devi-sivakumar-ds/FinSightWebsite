<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinSight - Accessible Banking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Playfair+Display:ital@1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar" aria-label="Main navigation">
    <a href="#hero" class="nav-brand" aria-label="FinSight home">
      <img src="assets/logo.jpeg" alt="FinSight logo" class="nav-logo" data-alt="nav.logoAlt" />
    </a>
    <a href="voice.html" class="voice-mode-link" aria-label="Open Voice Guided mode">
      Voice Guided
    </a>
  </nav>

  <main id="main-content" tabindex="-1">
    <!-- HERO -->
    <section class="hero" id="hero" aria-labelledby="hero-headline">
      <div class="container hero-inner">

        <h1 class="hero-headline fade-up delay-1" id="hero-headline">
          <span data-content="hero.headlinePrefix"></span><br>
          <span class="hero-headline-line2">
            <span class="cycling-word-wrapper" id="cyclingWrapper" aria-live="polite">
              <span class="cycling-word" id="cyclingWord"></span>
            </span>
          </span>
        </h1>

        <p class="hero-sub fade-up delay-2" data-content="hero.subtitle"></p>
      </div>
    </section>

    <!-- CHALLENGE -->
    <section class="challenge-section" id="problem" aria-labelledby="challenge-heading">
      <div class="challenge-inner container">

        <div class="phone-wrap">
          <div class="phone-frame challenge-phone-frame" id="challengePhoneFrame" role="group" data-aria-label="challenge.phone.mockupLabel">
            <div class="phone-notch" aria-hidden="true"></div>
            <div class="phone-screen-wrap">

              <div class="screen s1 active" data-aria-label="challenge.phone.balanceScreenLabel">
                <div class="app-header">
                  <span class="app-bank-name" data-content="challenge.phone.bankName"></span>
                  <span class="app-time" data-content="challenge.phone.time"></span>
                </div>
                <div class="app-balance-label" data-content="challenge.phone.balanceLabel"></div>
                <div class="app-balance" data-content="challenge.phone.balance"></div>
                <div class="app-actions-row">
                  <button class="app-action" data-content="challenge.phone.actions.0" data-aria-label="challenge.phone.actionLabels.0"></button>
                  <button class="app-action primary" data-content="challenge.phone.actions.1" data-aria-label="challenge.phone.actionLabels.1"></button>
                  <button class="app-action" data-content="challenge.phone.actions.2" data-aria-label="challenge.phone.actionLabels.2"></button>
                </div>
                <div class="app-recent-label" data-content="challenge.phone.recentLabel"></div>
                <div class="app-tx">
                  <span class="tx-name" data-content="challenge.phone.transactions.0.name"></span>
                  <span class="tx-amt" data-content="challenge.phone.transactions.0.amount"></span>
                </div>
                <div class="app-tx">
                  <span class="tx-name" data-content="challenge.phone.transactions.1.name"></span>
                  <span class="tx-amt" data-content="challenge.phone.transactions.1.amount"></span>
                </div>
              </div>

              <div class="screen s2" data-aria-label="challenge.phone.unlabeledScreenLabel">
                <div class="app-header s2-header">
                  <span data-content="challenge.phone.depositTitle"></span>
                </div>
                <div class="screen-reader-problem">
                  <div class="sr-terminal" data-html="challenge.phone.screenReaderOutputHtml"></div>
                  <button class="problem-deposit-button" data-content="challenge.phone.problemDepositAction" data-aria-label="challenge.phone.problemDepositActionLabel"></button>
                </div>
              </div>

              <div class="screen s3 problem-form-screen" data-aria-label="challenge.phone.formScreenLabel">
                <div class="app-header">
                  <span data-content="challenge.phone.depositTitle"></span>
                </div>
                <div class="problem-form-fields" aria-hidden="true">
                  <div class="problem-field short"></div>
                  <div class="problem-field"></div>
                  <div class="problem-field"></div>
                  <div class="problem-field"></div>
                </div>
              </div>

              <div class="screen s4 problem-camera-screen" data-aria-label="challenge.phone.cameraScreenLabel">
                <div class="camera-area">
                  <div class="camera-frame">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                    <div class="scan-line"></div>
                  </div>
                  <p class="camera-hint" data-content="challenge.phone.cameraHint"></p>
                </div>
              </div>

              <div class="screen s5 problem-camera-screen problem-error-screen" data-aria-label="challenge.phone.darkErrorScreenLabel">
                <div class="problem-camera-stage">
                  <div class="problem-camera-outline">
                    <div class="problem-check-shape"></div>
                  </div>
                  <div class="problem-banner error" data-content="challenge.phone.imageTooDarkError"></div>
                </div>
              </div>

              <div class="screen s6 problem-camera-screen problem-error-screen" data-aria-label="challenge.phone.frameErrorScreenLabel">
                <div class="problem-camera-stage">
                  <div class="problem-camera-outline is-misaligned">
                    <div class="problem-check-shape"></div>
                  </div>
                  <div class="problem-banner error" data-content="challenge.phone.checkNotInFrameError"></div>
                </div>
              </div>

              <div class="screen s7 problem-camera-screen" data-aria-label="challenge.phone.successScreenLabel">
                <div class="problem-camera-stage is-success">
                  <div class="problem-camera-outline">
                    <div class="problem-check-shape"></div>
                  </div>
                  <div class="problem-banner success" data-content="challenge.phone.checkCaptured"></div>
                </div>
              </div>

            </div>
            <div class="phone-home-bar" aria-hidden="true"></div>
          </div>
        </div>

        <div class="challenge-text">
          <h2 class="challenge-heading" id="challenge-heading" data-content="challenge.heading"></h2>
          <p class="challenge-body" data-content="challenge.body"></p>
        </div>

      </div>
    </section>

  <!-- STATS -->
    <section class="stats-section" id="stats" aria-labelledby="stats-label">
    <div class="container">
      <p class="section-label" id="stats-label" data-content="stats.label"></p>
      <div class="stats-grid">
        <div class="stat-block fade-up" role="group" data-aria-label="stats.items.0.accessibleLabel">
          <div class="stat-number" data-stat-index="0">0%</div>
          <p class="stat-label" data-content="stats.items.0.label"></p>
          <div class="stat-viz" aria-hidden="true">
            <div class="figures-row" id="figuresRow"></div>
          </div>
        </div>

        <div class="stat-block fade-up delay-1" role="group" data-aria-label="stats.items.1.accessibleLabel">
          <div class="stat-number" data-stat-index="1">0%</div>
          <p class="stat-label" data-content="stats.items.1.label"></p>
          <div class="stat-viz" aria-hidden="true">
            <div class="arcs-wrap">
              <div class="arc-item">
                <svg width="90" height="56" viewBox="0 0 90 56">
                  <path d="M 5 55 A 40 40 0 0 1 85 55" fill="none" stroke="var(--border)" stroke-width="8" stroke-linecap="round"/>
                  <path class="arc-path-frustrated" d="M 5 55 A 40 40 0 0 1 85 55" fill="none" stroke="var(--blue)" stroke-width="8" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="126"/>
                </svg>
                <div class="arc-caption-text" data-content="stats.items.1.arcCaption"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="stat-block fade-up delay-2" role="group" data-aria-label="stats.items.2.accessibleLabel">
          <div class="stat-number" data-stat-index="2">0%</div>
          <p class="stat-label" data-content="stats.items.2.label"></p>
          <div class="stat-viz" aria-hidden="true">
            <div class="arcs-wrap">
              <div class="arc-item">
                <svg width="90" height="56" viewBox="0 0 90 56">
                  <path d="M 5 55 A 40 40 0 0 1 85 55" fill="none" stroke="var(--border)" stroke-width="8" stroke-linecap="round"/>
                  <path class="arc-path-attempts" d="M 5 55 A 40 40 0 0 1 85 55" fill="none" stroke="var(--text-mid)" stroke-width="8" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="126"/>
                </svg>
                <div class="arc-caption-text" data-content="stats.items.2.arcCaption"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </section>

  <!-- SCREEN READERS -->
    <section class="screen-readers" aria-labelledby="sr-headline">
    <div class="container">
      <div class="sr-grid">
        <div class="fade-up">
          <div class="sr-app-icons" data-aria-label="screenReaders.toolsLabel">
            <div class="app-icon-item">
              <div class="app-icon-placeholder" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="14" cy="14" r="8" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M10 14 Q14 9 18 14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                  <circle cx="14" cy="14" r="2" fill="currentColor"/>
                </svg>
              </div>
              <div class="app-icon-label" data-content="screenReaders.tools.0"></div>
            </div>
            <div class="app-icon-item">
              <div class="app-icon-placeholder" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <rect x="8" y="6" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="14" cy="18" r="1.5" fill="currentColor"/>
                </svg>
              </div>
              <div class="app-icon-label" data-content="screenReaders.tools.1"></div>
            </div>
            <div class="app-icon-item">
              <div class="app-icon-placeholder" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="14" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M9 20 Q14 16 19 20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="app-icon-label" data-content="screenReaders.tools.2"></div>
            </div>
          </div>
          <h2 class="heading-lg sr-headline" id="sr-headline" data-html="screenReaders.headingHtml"></h2>
        </div>

        <div class="fade-up delay-1">
          <h3 class="heading-lg sr-answer" data-content="screenReaders.answer"></h3>
          <p class="sr-body-text" data-content="screenReaders.body"></p>
          <p class="sr-body-text sr-body-muted" data-content="screenReaders.subbody"></p>
        </div>
      </div>
    </div>
    </section>

  <!-- QUOTES -->
    <section class="quotes-section" aria-labelledby="quotes-label">
    <div class="container quotes-header">
      <p class="section-label" id="quotes-label" data-content="quotes.label"></p>
      <h2 class="quotes-heading" id="quotes-headline" data-content="quotes.heading"></h2>
    </div>

    <div class="quote-marquee" data-aria-label="quotes.rows.0.label">
      <div class="quote-row-label" data-content="quotes.rows.0.label"></div>
      <div class="quote-marquee-overflow">
        <div class="quote-track quote-track-left" id="blvQuoteTrack"></div>
      </div>
    </div>

    <div class="quote-marquee quote-marquee-experts" data-aria-label="quotes.rows.1.label">
      <div class="quote-row-label" data-content="quotes.rows.1.label"></div>
      <div class="quote-marquee-overflow">
        <div class="quote-track quote-track-right" id="expertQuoteTrack"></div>
      </div>
    </div>
    </section>

  <!-- MEET FINSIGHT -->
    <section class="meet-finsight" aria-labelledby="meet-headline">
    <div class="container">
      <h2 class="display-heading fade-up" id="meet-headline" data-content="meet.heading"></h2>
      <p class="body-lg fade-up delay-1" data-content="meet.subtitle"></p>

      <div class="phone-rings-wrap fade-up delay-2" role="img" data-aria-label="meet.app.mockupLabel">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="ring ring-4"></div>
        <div class="phone-portrait">
          <div class="meet-phone-notch" aria-hidden="true"></div>
          <div class="phone-portrait-screen">
            <div class="finsight-frame-demo" id="finsightFrameDemo"></div>
          </div>
        </div>
      </div>
    </div>
    </section>

  <!-- BRIDGE -->
    <section class="bridge-section" aria-label="Audio guidance transition">
    <div class="container">
      <p class="bridge-text" data-content="bridge.text"></p>
    </div>
    </section>

  <!-- DESIGN GUIDELINES -->
    <section class="guidelines-section" id="guidelines" aria-labelledby="guidelines-heading">
    <div class="guidelines-layout">
      <div class="guidelines-sticky">
        <h2 class="gl-heading" id="guidelines-heading" data-html="guidelines.headingHtml"></h2>
        <nav class="gl-nav" data-aria-label="guidelines.navLabel"></nav>
      </div>
      <div class="guidelines-scroll" id="guidelinesScroll"></div>
    </div>
    </section>

  <!-- PROTOTYPE -->
    <section class="prototype-section" id="prototype" aria-labelledby="prototype-heading">
    <div class="container">
      <h2 class="proto-heading" id="prototype-heading" data-content="prototype.heading"></h2>
      <p class="proto-sub" data-content="prototype.subtitle"></p>
      <div class="proto-embed">
        <iframe
          class="proto-video"
          src="https://drive.google.com/file/d/1D7Ul_GCffDJgkmIzSKVLo5xy_3dNQs1o/preview"
          title="FinSight prototype video"
          allow="autoplay; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
    </div>
    </section>

  <!-- TEAM -->
    <section class="team-section" id="team" aria-labelledby="team-heading">
    <div class="container">
      <h2 class="team-heading" id="team-heading" data-content="team.heading"></h2>
      <div class="team-cards-grid" id="teamCardsGrid"></div>
      <div class="marquee-overflow">
        <div class="marquee-scroll-track" id="teamMarqueeTrack"></div>
      </div>
    </div>
    </section>
  </main>

  

  <script src="./content.js?v=2"></script>
  <script src="./script.js?v=2"></script>
</body>
</html>
