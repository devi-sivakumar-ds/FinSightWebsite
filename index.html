<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Playfair+Display:ital@1&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="#hero" class="nav-brand">
      <img src="assets/logo.jpeg" alt="" class="nav-logo" data-alt="nav.logoAlt" />
    </a>
  </nav>

  <!-- HERO -->
  <section class="hero" id="hero" aria-labelledby="hero-headline">
    <div class="container hero-inner">

      <h1 class="hero-headline fade-up delay-1" id="hero-headline">
        <span data-content="hero.headlinePrefix"></span><br>
        <span class="hero-headline-line2">
          <span class="cycling-word-wrapper" id="cyclingWrapper" aria-live="polite">
            <span class="cycling-word" id="cyclingWord"></span>
          </span>
        </span>
      </h1>

      <p class="hero-sub fade-up delay-2" data-content="hero.subtitle"></p>
    </div>
  </section>

  <!-- CHALLENGE -->
  <section class="challenge-section" id="problem">
    <div class="challenge-inner container">

      <div class="phone-wrap">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-screen-wrap">

            <div class="screen s1 active">
              <div class="app-header">
                <span class="app-bank-name" data-content="challenge.phone.bankName"></span>
                <span class="app-time" data-content="challenge.phone.time"></span>
              </div>
              <div class="app-balance-label" data-content="challenge.phone.balanceLabel"></div>
              <div class="app-balance" data-content="challenge.phone.balance"></div>
              <div class="app-actions-row">
                <button class="app-action" data-content="challenge.phone.actions.0"></button>
                <button class="app-action primary" data-content="challenge.phone.actions.1"></button>
                <button class="app-action" data-content="challenge.phone.actions.2"></button>
              </div>
              <div class="app-recent-label" data-content="challenge.phone.recentLabel"></div>
              <div class="app-tx">
                <span class="tx-name" data-content="challenge.phone.transactions.0.name"></span>
                <span class="tx-amt" data-content="challenge.phone.transactions.0.amount"></span>
              </div>
              <div class="app-tx">
                <span class="tx-name" data-content="challenge.phone.transactions.1.name"></span>
                <span class="tx-amt" data-content="challenge.phone.transactions.1.amount"></span>
              </div>
            </div>

            <div class="screen s2">
              <div class="app-header s2-header">
                <span data-content="challenge.phone.depositTitle"></span>
              </div>
              <div class="camera-area">
                <div class="camera-frame">
                  <div class="corner tl"></div>
                  <div class="corner tr"></div>
                  <div class="corner bl"></div>
                  <div class="corner br"></div>
                  <div class="scan-line"></div>
                </div>
                <p class="camera-hint" data-content="challenge.phone.cameraHint"></p>
              </div>
            </div>

            <div class="screen s3">
              <div class="app-header">
                <span class="app-bank-name" data-content="challenge.phone.processingTitle"></span>
              </div>
              <div class="processing-wrap">
                <div class="spinner-ring"></div>
                <p class="processing-label" data-content="challenge.phone.processingLabel"></p>
                <p class="processing-sub" data-content="challenge.phone.processingSub"></p>
              </div>
            </div>

            <div class="screen s4">
              <div class="app-header success-header">
                <span data-content="challenge.phone.successTitle"></span>
              </div>
              <div class="success-wrap">
                <div class="success-icon">✓</div>
                <div class="success-amount" data-content="challenge.phone.successAmount"></div>
                <p class="success-label" data-content="challenge.phone.successLabel"></p>
                <p class="success-sub" data-content="challenge.phone.successSub"></p>
                <div class="success-ref" data-content="challenge.phone.successRef"></div>
              </div>
            </div>

          </div>
          <div class="phone-home-bar"></div>
        </div>
      </div>

      <div class="challenge-text">
        <h2 class="challenge-heading" data-content="challenge.heading"></h2>
        <p class="challenge-body" data-content="challenge.body"></p>
      </div>

    </div>
  </section>

  <!-- STATS -->
  <section class="stats-section" id="stats" aria-labelledby="stats-label">
    <div class="container">
      <p class="section-label" id="stats-label" data-content="stats.label"></p>
      <div class="stats-grid">
        <div class="stat-block fade-up">
          <div class="stat-number" data-stat-index="0">0%</div>
          <p class="stat-label" data-content="stats.items.0.label"></p>
          <div class="stat-viz" aria-hidden="true">
            <div class="figures-row" id="figuresRow"></div>
          </div>
        </div>

        <div class="stat-block fade-up delay-1">
          <div class="stat-number" data-stat-index="1">0%</div>
          <p class="stat-label" data-content="stats.items.1.label"></p>
          <div class="stat-viz bar-chart" aria-hidden="true">
            <div class="bar-row">
              <span class="bar-row-label" data-content="stats.items.1.bars.0.label"></span>
              <div class="bar-track">
                <div class="bar-fill is-primary" data-bar-index="0"></div>
              </div>
            </div>
            <div class="bar-row">
              <span class="bar-row-label" data-content="stats.items.1.bars.1.label"></span>
              <div class="bar-track">
                <div class="bar-fill" data-bar-index="1"></div>
              </div>
            </div>
            <div class="bar-row">
              <span class="bar-row-label" data-content="stats.items.1.bars.2.label"></span>
              <div class="bar-track">
                <div class="bar-fill" data-bar-index="2"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="stat-block fade-up delay-2">
          <div class="stat-number" data-stat-index="2">0%</div>
          <p class="stat-label" data-content="stats.items.2.label"></p>
          <div class="stat-viz" aria-hidden="true">
            <div class="arcs-wrap">
              <div class="arc-item">
                <svg width="90" height="56" viewBox="0 0 90 56">
                  <path d="M 5 55 A 40 40 0 0 1 85 55" fill="none" stroke="var(--border)" stroke-width="8" stroke-linecap="round"/>
                  <path class="arc-path-frustrated" d="M 5 55 A 40 40 0 0 1 85 55" fill="none" stroke="var(--blue)" stroke-width="8" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="126"/>
                </svg>
                <div class="arc-caption-text" data-content="stats.items.2.captions.0"></div>
              </div>
              <div class="arc-divider">→</div>
              <div class="arc-item">
                <svg width="90" height="56" viewBox="0 0 90 56">
                  <path d="M 5 55 A 40 40 0 0 1 85 55" fill="none" stroke="var(--border)" stroke-width="8" stroke-linecap="round"/>
                  <path class="arc-path-attempts" d="M 5 55 A 40 40 0 0 1 85 55" fill="none" stroke="var(--text-light)" stroke-width="8" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="126"/>
                </svg>
                <div class="arc-caption-text" data-content="stats.items.2.captions.1"></div>
              </div>
            </div>
            <p class="arc-note" data-content="stats.items.2.note"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- SCREEN READERS -->
  <section class="screen-readers" aria-labelledby="sr-headline">
    <div class="container">
      <div class="sr-grid">
        <div class="fade-up">
          <div class="sr-app-icons" data-aria-label="screenReaders.toolsLabel">
            <div class="app-icon-item">
              <div class="app-icon-placeholder" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="14" cy="14" r="8" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M10 14 Q14 9 18 14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                  <circle cx="14" cy="14" r="2" fill="currentColor"/>
                </svg>
              </div>
              <div class="app-icon-label" data-content="screenReaders.tools.0"></div>
            </div>
            <div class="app-icon-item">
              <div class="app-icon-placeholder" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <rect x="8" y="6" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="14" cy="18" r="1.5" fill="currentColor"/>
                </svg>
              </div>
              <div class="app-icon-label" data-content="screenReaders.tools.1"></div>
            </div>
            <div class="app-icon-item">
              <div class="app-icon-placeholder" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <circle cx="14" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M9 20 Q14 16 19 20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                </svg>
              </div>
              <div class="app-icon-label" data-content="screenReaders.tools.2"></div>
            </div>
          </div>
          <h2 class="heading-lg sr-headline" id="sr-headline" data-html="screenReaders.headingHtml"></h2>
        </div>

        <div class="fade-up delay-1">
          <h3 class="heading-lg sr-answer" data-content="screenReaders.answer"></h3>
          <div class="sr-stat-boxes">
            <div class="sr-stat-box">
              <div class="sr-stat-num" data-content="screenReaders.statBoxes.0.number"></div>
              <p class="sr-stat-text" data-content="screenReaders.statBoxes.0.text"></p>
            </div>
            <div class="sr-stat-box">
              <div class="sr-stat-num" data-content="screenReaders.statBoxes.1.number"></div>
              <p class="sr-stat-text" data-content="screenReaders.statBoxes.1.text"></p>
            </div>
            <div class="sr-stat-box">
              <div class="sr-stat-num" data-content="screenReaders.statBoxes.2.number"></div>
              <p class="sr-stat-text" data-content="screenReaders.statBoxes.2.text"></p>
            </div>
          </div>
          <blockquote class="sr-quote">
            <p class="sr-quote-text" data-content="screenReaders.quote"></p>
            <cite class="sr-quote-attr" data-content="screenReaders.quoteAttr"></cite>
          </blockquote>
        </div>
      </div>
    </div>
  </section>

  <!-- MEET FINSIGHT -->
  <section class="meet-finsight" aria-labelledby="meet-headline">
    <div class="container">
      <h2 class="display-heading fade-up" id="meet-headline" data-content="meet.heading"></h2>
      <p class="body-lg fade-up delay-1" data-content="meet.subtitle"></p>

      <div class="phone-rings-wrap fade-up delay-2" aria-hidden="true">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="ring ring-4"></div>
        <div class="phone-portrait">
          <div class="meet-phone-notch"></div>
          <div class="phone-portrait-screen">
            <video class="phone-demo-video" autoplay muted loop playsinline>
              <source src="assets/finsightAppVideo.mp4" type="video/mp4">
            </video>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- BRIDGE -->
  <section class="bridge-section">
    <div class="container">
      <p class="bridge-text" data-content="bridge.text"></p>
    </div>
  </section>

  <!-- DESIGN GUIDELINES -->
  <section class="guidelines-section" id="guidelines">
    <div class="guidelines-layout">
      <div class="guidelines-sticky">
        <h2 class="gl-heading" data-html="guidelines.headingHtml"></h2>
        <nav class="gl-nav" data-aria-label="guidelines.navLabel"></nav>
      </div>
      <div class="guidelines-scroll" id="guidelinesScroll"></div>
    </div>
  </section>

  <!-- PROTOTYPE -->
  <section class="prototype-section" id="prototype">
    <div class="container">
      <h2 class="proto-heading" data-content="prototype.heading"></h2>
      <p class="proto-sub" data-content="prototype.subtitle"></p>
      <div class="proto-embed">
        <p class="proto-placeholder" data-content="prototype.placeholder"></p>
      </div>
    </div>
  </section>

  <!-- TEAM -->
  <section class="team-section" id="team">
    <div class="container">
      <h2 class="team-heading" data-content="team.heading"></h2>
      <div class="team-cards-grid" id="teamCardsGrid"></div>
    </div>

    <div class="photos-marquee-wrap">
      <p class="marquee-section-heading" data-content="team.processHeading"></p>
      <div class="marquee-overflow">
        <div class="marquee-scroll-track" id="teamMarqueeTrack"></div>
      </div>
    </div>
  </section>

  

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
