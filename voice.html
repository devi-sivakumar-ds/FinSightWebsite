<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinSight Voice Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="voice.css" />
</head>
<body>
  <a class="skip-link" href="#voice-sections">Skip to sections</a>
  <a class="skip-link skip-link-secondary" href="#transcript-heading">Skip to current transcript</a>

  <header class="voice-topbar">
    <a class="voice-brand" href="index.html" aria-label="FinSight standard site">
      <img src="assets/logo.jpeg" alt="FinSight" class="voice-logo" />
    </a>
    <a class="standard-link" href="index.html" data-action-label="exit">Standard site</a>
  </header>

  <main class="voice-page">
    <section class="voice-hero" aria-labelledby="voice-title">
      <p class="voice-eyebrow" id="voice-eyebrow"></p>
      <h1 id="voice-title"></h1>
      <p class="voice-intro" id="voice-intro"></p>
    </section>

    <section class="player-shell" aria-labelledby="player-heading">
      <h2 class="sr-only" id="player-heading">Voice guide player</h2>
      <div class="player-status" aria-live="polite">
        <span id="status-kicker"></span>
        <strong id="status-title"></strong>
        <span id="status-progress"></span>
      </div>
      <p class="sr-only" id="playback-announcement" aria-live="polite" aria-atomic="true"></p>

      <div class="progress-track" id="progress-track" role="progressbar" aria-valuemin="1" aria-valuemax="9" aria-valuenow="1" aria-label="Voice guide progress">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <p class="sr-only" id="player-shortcuts">Keyboard shortcuts: press Space to play or pause, Left Arrow for the previous section, Right Arrow for the next section, and Escape to stop playback.</p>
      <div class="player-controls" id="player-controls" aria-label="Voice guide controls" aria-describedby="player-shortcuts">
        <button class="icon-button" type="button" id="previous-button" aria-label="Previous section" title="Previous section">
          <span aria-hidden="true">←</span>
        </button>
        <button class="primary-button" type="button" id="play-button" aria-label="Play voice guide" aria-pressed="false">
          <span id="play-label">Play</span>
        </button>
        <button class="icon-button" type="button" id="next-button" aria-label="Next section" title="Next section">
          <span aria-hidden="true">→</span>
        </button>
        <button class="text-button" type="button" id="replay-button" aria-label="Replay current section">Replay</button>
      </div>

      <div class="voice-settings" aria-labelledby="voice-settings-heading">
        <h3 class="sr-only" id="voice-settings-heading">Voice settings</h3>
        <fieldset class="setting-group">
          <legend id="speed-label">Speed</legend>
          <div class="segmented-control" id="speed-control" role="radiogroup" aria-labelledby="speed-label"></div>
        </fieldset>
        <fieldset class="setting-group">
          <legend id="verbosity-label">Verbosity</legend>
          <div class="segmented-control" id="verbosity-control" role="radiogroup" aria-labelledby="verbosity-label"></div>
        </fieldset>
      </div>

      <p class="speech-warning" id="speech-warning" hidden></p>
    </section>

    <section class="reader-layout" aria-labelledby="voice-content-heading">
      <h2 class="sr-only" id="voice-content-heading">Voice guided content</h2>
      <nav class="section-list" id="voice-sections" aria-label="Voice guide sections"></nav>

      <aside class="transcript-panel" aria-labelledby="transcript-heading" aria-live="off">
        <p class="panel-label">Now Reading</p>
        <h2 id="transcript-heading"></h2>
        <p class="transcript-text" id="transcript-text"></p>
      </aside>
    </section>
  </main>

  <script src="./content.js?v=2"></script>
  <script src="./voice.js?v=1"></script>
</body>
</html>
